name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (publish without actually uploading to npm)"
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install
        uses: ./.github/common-actions/install

      - name: Build packages
        run: pnpm build

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish @heroui/styles
        id: publish-styles
        working-directory: packages/styles
        run: npm publish --access public ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Publish @heroui/react
        if: steps.publish-styles.outcome == 'success'
        working-directory: packages/react
        run: npm publish --access public ${{ inputs.dry_run && '--dry-run' || '' }}
